apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: distill-rss-db
  namespace: distill-rss
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: distill-rss-digests
  namespace: distill-rss
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 512Mi
